<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e85c2c"/>
      <stop offset="100%" stop-color="#ff9147"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e85c2c"/>
      <stop offset="100%" stop-color="#ff9147"/>
    </linearGradient>
    <linearGradient id="ctaBg" x1="0" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e85c2c"/>
      <stop offset="100%" stop-color="#ff9147"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.055)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#181818"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Right glow -->
  <ellipse cx="1060" cy="220" rx="300" ry="240" fill="rgba(232,92,44,0.08)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)"/>

  <!-- ── Logo mark ────────────────────────── -->
  <g transform="translate(80, 52)">
    <rect width="72" height="72" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <polygon points="36,12 56,60 16,60" fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
    <line x1="23" y1="46" x2="49" y2="46" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="36" cy="63" r="4" fill="#e054a0"/>
  </g>

  <!-- ── Name & Role ─────────────────────── -->
  <text x="172" y="88" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="26" fill="white">Aman Goyal</text>
  <text x="172" y="116" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.45)">DevOps &amp; Backend Engineer  ·  Founding Engineer at Vubo</text>

  <!-- ── Divider ────────────────────────── -->
  <line x1="80" y1="154" x2="1120" y2="154" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ── HEADLINE ────────────────────────── -->
  <text x="80" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="86" fill="white" letter-spacing="-2">Ship Fast.</text>
  <text x="80" y="372" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="86" fill="url(#textGrad)" letter-spacing="-2">Stay Up.</text>

  <!-- ── Sub-headline ───────────────────── -->
  <text x="80" y="424" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.5)">Infrastructure · CI/CD · Cloud Architecture · APIs</text>

  <!-- ── CTA button ─────────────────────── -->
  <rect x="80" y="462" width="234" height="52" rx="12" fill="url(#ctaBg)"/>
  <text x="197" y="494" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="white" text-anchor="middle">View My Portfolio  →</text>

  <!-- ── Tech badges ────────────────────── -->
  <rect x="332" y="462" width="68" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="366" y="494" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">AWS</text>

  <rect x="412" y="462" width="88" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="456" y="494" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Terraform</text>

  <rect x="512" y="462" width="72" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="548" y="494" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Docker</text>

  <rect x="596" y="462" width="76" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="634" y="494" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Node.js</text>

  <rect x="684" y="462" width="94" height="52" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="731" y="494" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Kubernetes</text>

  <!-- ── URL ────────────────────────────── -->
  <text x="80" y="584" font-family="'Courier New', Courier, monospace" font-size="18" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">agoyel25.github.io</text>

  <!-- ── Decorative circuit lines (right) ── -->
  <g opacity="0.12" stroke="white" stroke-width="1">
    <line x1="900" y1="80" x2="1120" y2="80"/>
    <line x1="1120" y1="80" x2="1120" y2="320"/>
    <line x1="840" y1="180" x2="1020" y2="180"/>
    <line x1="1020" y1="180" x2="1020" y2="420"/>
    <line x1="1020" y1="420" x2="1160" y2="420"/>
    <line x1="880" y1="500" x2="1060" y2="500"/>
    <line x1="1060" y1="500" x2="1060" y2="580"/>
    <circle cx="900" cy="80" r="3.5" fill="white"/>
    <circle cx="1120" cy="80" r="3.5" fill="white"/>
    <circle cx="1120" cy="320" r="3.5" fill="white"/>
    <circle cx="840" cy="180" r="3.5" fill="white"/>
    <circle cx="1020" cy="180" r="3.5" fill="white"/>
    <circle cx="1020" cy="420" r="3.5" fill="white"/>
    <circle cx="1160" cy="420" r="3.5" fill="white"/>
    <circle cx="880" cy="500" r="3.5" fill="white"/>
    <circle cx="1060" cy="500" r="3.5" fill="white"/>
    <circle cx="1060" cy="580" r="3.5" fill="white"/>
  </g>
  <!-- accent nodes -->
  <circle cx="1120" cy="320" r="6" fill="#e85c2c" opacity="0.7"/>
  <circle cx="840" cy="180" r="6" fill="#ff9147" opacity="0.5"/>
</svg>
